name: Production deployment

on:
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/deploy.yml
    with:
      environment: prod
      runner: prod
      image_tag: prod
      container_name: tasks-app-prod
    secrets:
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      JWT_TOKEN: ${{ secrets.JWT_TOKEN }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}