name: Dev deployment

on:
  push:
    branches: ["dev"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: dev-marian-vybyranyi/nest.js-ts-typeorm-postgresql-docker

jobs:
  build-and-push:
    runs-on: [self-hosted, dev]
    environment: dev
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev

  deploy:
    runs-on: [self-hosted, dev]
    environment: dev
    needs: build-and-push

    steps:
      - name: Create .env file
        run: |
          cat > /home/ubuntu/.env << EOF
          APP_MESSAGE_PREFIX=${{ vars.APP_MESSAGE_PREFIX }}
          DB_HOST=${{ vars.DB_HOST }}
          DB_PORT=${{ vars.DB_PORT }}
          DB_USER=${{ vars.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_DATABASE=${{ vars.DB_DATABASE }}
          DB_SYNC=${{ vars.DB_SYNC }}
          JWT_TOKEN=${{ secrets.JWT_TOKEN }}
          JWT_EXPIRES_IN=${{ vars.JWT_EXPIRES_IN }}
          APP_PORT=${{ vars.APP_PORT }}
          EOF

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest image
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev

      - name: Stop and remove existing container
        run: docker stop tasks-app-dev || true && docker rm tasks-app-dev || true

      - name: Run new container
        run: |
          docker run -d \
            --name tasks-app-dev \
            --env-file /home/ubuntu/.env \
            --network host \
            --restart unless-stopped \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev