name: Dev deployment

on:
  push:
    branches: ["dev"]
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/deploy.yml
    with:
      environment: dev
      runner: dev
      image_tag: dev
      container_name: tasks-app-dev
    secrets:
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      JWT_TOKEN: ${{ secrets.JWT_TOKEN }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}