name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      runner:
        required: true
        type: string
      image_tag:
        required: true
        type: string
      container_name:
        required: true
        type: string
    secrets:
      DB_PASSWORD:
        required: true
      JWT_TOKEN:
        required: true
      SENTRY_DSN:
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: dev-marian-vybyranyi/nest.js-ts-typeorm-postgresql-docker

jobs:
  build-and-push:
    runs-on: ${{ fromJson(format('["self-hosted", "{0}"]', inputs.runner)) }}
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}
          cache-to: type=inline

  deploy:
    runs-on: ${{ fromJson(format('["self-hosted", "{0}"]', inputs.runner)) }}
    environment: ${{ inputs.environment }}
    needs: build-and-push

    steps:
      - name: Create .env file
        run: |
          cat > /home/ubuntu/.env << EOF
          APP_MESSAGE_PREFIX=${{ vars.APP_MESSAGE_PREFIX }}
          DB_HOST=${{ vars.DB_HOST }}
          DB_PORT=${{ vars.DB_PORT }}
          DB_USER=${{ vars.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_DATABASE=${{ vars.DB_DATABASE }}
          DB_SYNC=${{ vars.DB_SYNC }}
          JWT_TOKEN=${{ secrets.JWT_TOKEN }}
          JWT_EXPIRES_IN=${{ vars.JWT_EXPIRES_IN }}
          APP_PORT=${{ vars.APP_PORT }}
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          EOF

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest image
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}

      - name: Stop and remove existing container
        run: docker stop ${{ inputs.container_name }} || true && docker rm ${{ inputs.container_name }} || true

      - name: Run new container
        run: |
          docker run -d \
            --name ${{ inputs.container_name }} \
            --env-file /home/ubuntu/.env \
            --network host \
            --restart unless-stopped \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}